name: Claims Management Module CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-deploy-backend:
    name: Build & Deploy Backend (.NET 9)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore src/backend/ClaimsModule.sln

    - name: Build Backend Solution
      run: dotnet build src/backend/ClaimsModule.sln --configuration Release --no-restore

    - name: Publish Backend Package
      run: dotnet publish src/backend/ClaimsModule.API/ClaimsModule.API.csproj --configuration Release --output ./publish_output

    - name: Deploy to Azure App Service
      # Only runs if the publish profile secret is configured in the repository
      if: "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}"
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'diceus-claims-api' # Name will be adjusted by deploy profile
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish_output

  build-and-deploy-frontend:
    name: Build & Deploy Frontend (Angular 18)
    runs-on: ubuntu-latest
    needs: build-and-deploy-backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: src/frontend/claims-app/package-lock.json

    - name: Install Dependencies
      working-directory: src/frontend/claims-app
      run: npm ci

    - name: Inject Production API URL into Config
      # Reads the Azure Backend App URL from secrets or environment, falling back to a placeholder
      run: |
        BACKEND_URL="${{ secrets.AZURE_BACKEND_URL }}"
        if [ -z "$BACKEND_URL" ]; then
          # Fallback if URL is not set in secrets
          BACKEND_URL="https://diceus-claims-api.azurewebsites.net"
        fi
        echo "Injecting Backend API URL: $BACKEND_URL"
        echo "{\"apiUrl\": \"$BACKEND_URL\"}" > src/frontend/claims-app/public/config.json

    - name: Build Angular Application
      working-directory: src/frontend/claims-app
      run: npm run build -- --configuration=production

    - name: Prepare Node.js Host Package for App Service
      working-directory: src/frontend/claims-app
      run: |
        mkdir -p dist/claims-app
        
        # Create server.js inside dist/claims-app
        cat << 'EOF' > dist/claims-app/server.js
        const express = require('express');
        const path = require('path');
        const app = express();
        const port = process.env.PORT || 8080;
        
        app.use(express.static(path.join(__dirname, 'browser')));
        app.get('/*', (req, res) => {
          res.sendFile(path.join(__dirname, 'browser', 'index.html'));
        });
        app.listen(port, () => console.log(`Server running on port ${port}`));
        EOF
        
        # Create package.json inside dist/claims-app
        cat << 'EOF' > dist/claims-app/package.json
        {
          "name": "claims-frontend",
          "version": "1.0.0",
          "main": "server.js",
          "scripts": {
            "start": "node server.js"
          },
          "dependencies": {
            "express": "^4.19.2"
          }
        }
        EOF

    - name: Deploy to Azure App Service (Frontend)
      if: "${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE != '' }}"
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'diceus-claims-frontend' # Name will be adjusted by deploy profile
        publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
        package: src/frontend/claims-app/dist/claims-app
