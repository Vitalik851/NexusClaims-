name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore src/backend/ClaimsModule.slnx

      - name: Build Backend Solution
        run: dotnet build src/backend/ClaimsModule.slnx --configuration Release --no-restore

      - name: Publish Backend Package
        run: dotnet publish src/backend/ClaimsModule.API/ClaimsModule.API.csproj --configuration Release --output ./publish_output

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: ./publish_output

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/claims-app/package-lock.json

      - name: Install Dependencies
        working-directory: src/frontend/claims-app
        run: npm ci

      - name: Inject Production API URL
        run: |
          BACKEND_URL="${{ secrets.AZURE_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://diceus-claims-jmnxyait7hjje-api.azurewebsites.net"
          fi
          echo "Injecting Backend API URL: $BACKEND_URL"
          echo "{\"apiUrl\": \"$BACKEND_URL\"}" > src/frontend/claims-app/public/config.json

      - name: Build Angular Application
        working-directory: src/frontend/claims-app
        run: npm run build -- --configuration=production

      - name: Prepare Node.js Host Package
        working-directory: src/frontend/claims-app
        run: |
          cat << 'SERVEREOF' > dist/claims-app/server.js
          const express = require('express');
          const path = require('path');
          const app = express();
          const port = process.env.PORT || 8080;
          app.use(express.static(path.join(__dirname, 'browser')));
          app.get('/*', (req, res) => {
            res.sendFile(path.join(__dirname, 'browser', 'index.html'));
          });
          app.listen(port, () => console.log(`Server running on port ${port}`));
          SERVEREOF
          cat << 'PKGEOF' > dist/claims-app/package.json
          {
            "name": "claims-frontend",
            "version": "1.0.0",
            "main": "server.js",
            "scripts": {
              "start": "node server.js"
            },
            "dependencies": {
              "express": "^4.19.2"
            }
          }
          PKGEOF

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-package
          path: src/frontend/claims-app/dist/claims-app

  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: ./publish_output

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: diceus-claims-jmnxyait7hjje-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish_output

  deploy-frontend:
    name: Deploy Frontend to Azure
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-package
          path: ./frontend-package

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: diceus-claims-jmnxyait7hjje-frontend
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend-package
